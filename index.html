<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-900 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドライブ割り勘＆精算管理 App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
  </style>
</head>
<body class="h-full overflow-hidden flex flex-col">

  <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center shrink-0 gap-4">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-500/20">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
          ドライブ精算マネージャー <span class="text-xs bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded-full font-normal">v1.2</span>
        </h1>
        <p class="text-xs text-slate-400">画像OCR解析シミュレータ ＆ 個別立替キャッシュフロー最適化</p>
      </div>
    </div>
    
    <div class="flex items-center gap-2 self-stretch sm:self-auto">
      <label class="text-xs font-medium text-slate-400 shrink-0">旅の履歴から復元:</label>
      <select id="preset-selector" class="w-full sm:w-64 bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
        <option value="custom">新規作成 (マニュアル入力)</option>
        <option value="trip_0608" selected>2026/06/08 入谷〜幡ヶ谷 (今回)</option>
        <option value="trip_nagano">2026/05/02 長野・群馬遠征 (岩崎/徳永/真下/佐々木)</option>
        <option value="trip_chiba">2026/05/23 千葉・幕張ドライブ (2人割り勘)</option>
        <option value="trip_kamakura">2026/01/10 鎌倉・藤沢ドライブ (餃子のみ割り勘)</option>
      </select>
    </div>
  </header>

  <main class="flex-1 overflow-hidden flex flex-col lg:flex-row">
    
    <section class="flex-[2] overflow-y-auto p-6 space-y-6 border-r border-slate-800">
      
      <div class="bg-gradient-to-br from-slate-900 to-indigo-950/40 border border-slate-800 rounded-xl p-6 shadow-xl relative h-auto">
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-sm font-semibold tracking-wide text-indigo-400 uppercase flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            画像OCR解析シミュレータ
          </h2>
          <span class="text-xs text-slate-400">メーターやレシート写真を自動解析</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <button onclick="triggerOcrSim('meter')" class="group flex flex-col items-center justify-center p-6 bg-slate-950/60 hover:bg-slate-950 border border-slate-800 hover:border-indigo-500/50 rounded-xl transition-all text-center min-h-[140px] h-full">
            <div class="w-12 h-12 rounded-full bg-slate-900 group-hover:bg-indigo-500/10 flex items-center justify-center mb-3 text-slate-400 group-hover:text-indigo-400 transition-all shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
              </svg>
            </div>
            <span class="text-sm font-bold text-slate-200 block">メーター画像</span>
            <span class="text-xs text-slate-500 mt-1.5 block">TRIP/平均燃費を抽出</span>
          </button>

          <button onclick="triggerOcrSim('gogogs')" class="group flex flex-col items-center justify-center p-6 bg-slate-950/60 hover:bg-slate-950 border border-slate-800 hover:border-indigo-500/50 rounded-xl transition-all text-center min-h-[140px] h-full">
            <div class="w-12 h-12 rounded-full bg-slate-900 group-hover:bg-indigo-500/10 flex items-center justify-center mb-3 text-slate-400 group-hover:text-indigo-400 transition-all shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <span class="text-sm font-bold text-slate-200 block">gogo.gsスクショ</span>
            <span class="text-xs text-slate-500 mt-1.5 block">東京都ガソリン平均単価</span>
          </button>

          <button onclick="triggerOcrSim('receipt')" class="group flex flex-col items-center justify-center p-6 bg-slate-950/60 hover:bg-slate-950 border border-slate-800 hover:border-indigo-500/50 rounded-xl transition-all text-center min-h-[140px] h-full">
            <div class="w-12 h-12 rounded-full bg-slate-900 group-hover:bg-indigo-500/10 flex items-center justify-center mb-3 text-slate-400 group-hover:text-indigo-400 transition-all shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </div>
            <span class="text-sm font-bold text-slate-200 block">レシート・領収書</span>
            <span class="text-xs text-slate-500 mt-1.5 block">特定メニュー選別・自動認識</span>
          </button>
        </div>

        <div id="ocr-scanner" class="hidden absolute inset-0 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center transition-all duration-300 z-10 rounded-xl">
          <div class="relative w-80 h-44 border border-dashed border-indigo-500/50 rounded-lg flex flex-col items-center justify-center p-4">
            <div class="absolute left-0 right-0 h-0.5 bg-indigo-500 shadow-lg shadow-indigo-500/50 animate-bounce" style="top: 10%;"></div>
            <svg class="w-8 h-8 text-indigo-400 animate-pulse mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            <span class="text-xs text-indigo-300 font-semibold" id="ocr-status">画像をスキャン中...</span>
            <span class="text-[10px] text-slate-500 mt-1" id="ocr-details">データを抽出しています</span>
          </div>
        </div>
      </div>

      <div class="bg-slate-950 border border-slate-800 rounded-xl p-5 shadow-md">
        <h3 class="text-sm font-semibold text-white border-b border-slate-800 pb-3 mb-4 flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
          車両・走行エネルギーパラメータ
        </h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">走行距離 (TRIP B)</label>
            <div class="relative rounded-lg shadow-sm">
              <input type="number" id="input-distance" step="0.1" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="0.0">
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <span class="text-xs text-slate-500">km</span>
              </div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">平均燃費</label>
            <div class="relative rounded-lg shadow-sm">
              <input type="number" id="input-fuel-economy" step="0.1" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="0.0">
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <span class="text-xs text-slate-500">km/L</span>
              </div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5 flex justify-between items-center">
              <span>ガソリン単価</span>
              <span class="text-[10px] text-slate-500">gogo.gs参照</span>
            </label>
            <div class="relative rounded-lg shadow-sm">
              <input type="number" id="input-gas-price" step="0.1" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="0">
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <span class="text-xs text-slate-500">円/L</span>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-4 p-4 bg-slate-900/60 rounded-lg border border-slate-800 flex justify-between items-center">
          <div>
            <p class="text-[11px] uppercase tracking-wider text-slate-500 font-semibold">自動算出ガソリン代</p>
            <p class="text-xs text-slate-400 mt-0.5 font-mono" id="gas-calc-formula">0.0km ÷ 0.0km/L × 0.0円</p>
          </div>
          <div class="text-right">
            <span class="text-xl font-bold text-emerald-400 font-mono" id="gas-calc-total">0</span>
            <span class="text-xs text-slate-400 ml-1">円</span>
          </div>
        </div>
      </div>

      <div class="bg-slate-950 border border-slate-800 rounded-xl p-5 shadow-md space-y-4">
        <div class="flex items-center justify-between border-b border-slate-800 pb-3">
          <h3 class="text-sm font-semibold text-white flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>
            経費詳細 (高速代・駐車場代・個別メニュー割り勘)
          </h3>
          <button onclick="addNewExpenseRow()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-2.5 py-1 rounded-md text-xs font-semibold flex items-center gap-1 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            経費を追加
          </button>
        </div>

        <div id="expense-container" class="space-y-3 max-h-[400px] overflow-y-auto pr-1"></div>
      </div>

    </section>

    <section class="flex-1 min-w-[360px] lg:max-w-[440px] bg-slate-950 border-t lg:border-t-0 border-slate-800 flex flex-col shrink-0">
      
      <div class="p-6 border-b border-slate-800 space-y-4 flex-1 overflow-y-auto">
        <h2 class="text-base font-bold text-white tracking-tight flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          割り勘・キャッシュフロー最適化
        </h2>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">メンバー構成</label>
            <button onclick="addMemberPrompt()" class="text-xs text-indigo-400 hover:text-indigo-300 font-semibold flex items-center gap-0.5">
              + 追加
            </button>
          </div>
          <div id="member-tag-container" class="flex flex-wrap gap-1.5 p-3 bg-slate-900/60 rounded-xl border border-slate-800"></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">端数処理方法</label>
            <select id="rounding-method" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
              <option value="round" selected>四捨五入</option>
              <option value="floor">切り捨て</option>
              <option value="ceil">切り上げ</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">丸め単位</label>
            <select id="rounding-unit" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
              <option value="1" selected>1円単位</option>
              <option value="10">10円単位</option>
              <option value="100">100円単位</option>
            </select>
          </div>
        </div>

        <div class="space-y-3 bg-slate-900/40 p-4 rounded-xl border border-slate-800">
          <div class="flex justify-between items-center text-xs text-slate-400">
            <span>経費総合計:</span>
            <span class="font-mono font-bold text-white text-sm" id="calc-grand-total">0円</span>
          </div>
          <div class="flex justify-between items-center text-xs text-slate-400 border-b border-slate-800 pb-2">
            <span>1人あたりの基準負担額:</span>
            <span class="font-mono font-bold text-indigo-400 text-sm" id="calc-per-capita">0円</span>
          </div>
          
          <div class="space-y-2">
            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">清算送金指示 (送金ルート最適化)</h4>
            <div id="settlement-route-container" class="space-y-2 text-xs"></div>
          </div>
        </div>

      </div>

      <div class="p-6 bg-slate-950 border-t border-slate-800 space-y-3 shrink-0 h-[280px] flex flex-col">
        <div class="flex justify-between items-center">
          <span class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
            LINE共有用テキスト
          </span>
          <button onclick="copyLineTextToClipboard()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
            コピー
          </button>
        </div>
        <textarea id="line-output" readonly class="flex-1 w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-300 resize-none focus:outline-none focus:ring-1 focus:ring-slate-700"></textarea>
      </div>

    </section>

  </main>

  <script>
    let members = ['岩崎', '徳永', '真下', '佐々木'];
    let expenses = [];
    
    const PRESETS = {
      trip_0608: {
        distance: 61.5,
        fuelEconomy: 11.7,
        gasPrice: 164.3,
        members: ['岩崎', '徳永', '真下'],
        expenses: [
          { name: 'スマートパークNS共栄下谷 駐車場', amount: 1600, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下'] }
        ]
      },
      trip_nagano: {
        distance: 675.2,
        fuelEconomy: 14.0,
        gasPrice: 163.4,
        members: ['岩崎', '徳永', '真下', '佐々木'],
        expenses: [
          { name: '高速代 (松本→吉井)', amount: 4040, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下', '佐々木'] },
          { name: '高速代 (駒形→真岡)', amount: 1760, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下', '佐々木'] },
          { name: '高速代 (谷和原→飯田橋)', amount: 1470, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下', '佐々木'] },
          { name: '食事代 (いちばんTH大人 4名)', amount: 14872, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下', '佐々木'] },
          { name: '自動車保険代', amount: 2700, paidBy: '徳永', splitWith: ['岩崎', '徳永', '真下', '佐々木'] }
        ]
      },
      trip_chiba: {
        distance: 108.7,
        fuelEconomy: 14.5,
        gasPrice: 163.6,
        members: ['岩崎', '真下'],
        expenses: [
          { name: '高速代 (幕張→三軒茶屋)', amount: 1160, paidBy: '岩崎', splitWith: ['岩崎', '真下'] }
        ]
      },
      trip_kamakura: {
        distance: 138.4,
        fuelEconomy: 12.0,
        gasPrice: 152.0,
        members: ['岩崎', '徳永', '真下', '佐々木'],
        expenses: [
          { name: '藤沢駅南口 駐車場', amount: 990, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下', '佐々木'] },
          { name: '中華大新 特製餃子(割り勘対象)', amount: 1000, paidBy: '岩崎', splitWith: ['岩崎', '徳永', '真下', '佐々木'] },
          { name: 'その他の中華代 (岩崎が単独負担)', amount: 930, paidBy: '岩崎', splitWith: ['岩崎'] }
        ]
      }
    };

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('preset-selector').addEventListener('change', loadSelectedPreset);
      document.getElementById('input-distance').addEventListener('input', runCalculations);
      document.getElementById('input-fuel-economy').addEventListener('input', runCalculations);
      document.getElementById('input-gas-price').addEventListener('input', runCalculations);
      document.getElementById('rounding-method').addEventListener('change', runCalculations);
      document.getElementById('rounding-unit').addEventListener('change', runCalculations);

      loadPreset('trip_0608');
    });

    function loadPreset(key) {
      const preset = PRESETS[key];
      if (!preset) return;

      members = [...preset.members];
      document.getElementById('input-distance').value = preset.distance;
      document.getElementById('input-fuel-economy').value = preset.fuelEconomy;
      document.getElementById('input-gas-price').value = preset.gasPrice;

      expenses = preset.expenses.map((exp, idx) => ({
        id: 'exp_' + Date.now() + '_' + idx,
        name: exp.name,
        amount: exp.amount,
        paidBy: exp.paidBy,
        splitWith: [...exp.splitWith]
      }));

      renderMembers();
      renderExpenses();
      runCalculations();
    }

    function loadSelectedPreset(e) {
      const val = e.target.value;
      if (val === 'custom') {
        members = ['岩崎', '徳永', '真下', '佐々木'];
        expenses = [];
        document.getElementById('input-distance').value = '';
        document.getElementById('input-fuel-economy').value = '';
        document.getElementById('input-gas-price').value = '';
        renderMembers();
        renderExpenses();
        runCalculations();
      } else {
        loadPreset(val);
      }
    }

    function renderMembers() {
      const container = document.getElementById('member-tag-container');
      container.innerHTML = '';
      members.forEach(m => {
        const tag = document.createElement('div');
        tag.className = 'inline-flex items-center gap-1 px-2.5 py-1 bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 rounded-lg text-xs font-semibold';
        tag.innerHTML = `
          <span>${m}</span>
          <button onclick="removeMember('${m}')" class="text-indigo-400 hover:text-indigo-200 focus:outline-none ml-1">×</button>
        `;
        container.appendChild(tag);
      });
    }

    function addMemberPrompt() {
      const name = prompt('追加するメンバーの名前を入力してください:');
      if (name && name.trim()) {
        const cleaned = name.trim();
        if (!members.includes(cleaned)) {
          members.push(cleaned);
          renderMembers();
          expenses.forEach(exp => exp.splitWith.push(cleaned));
          renderExpenses();
          runCalculations();
        }
      }
    }

    function removeMember(name) {
      if (members.length <= 1) {
        alert('最低1名のメンバーが必要です。');
        return;
      }
      members = members.filter(m => m !== name);
      expenses.forEach(exp => {
        if (exp.paidBy === name) exp.paidBy = members[0];
        exp.splitWith = exp.splitWith.filter(m => m !== name);
      });
      renderMembers();
      renderExpenses();
      runCalculations();
    }

    function renderExpenses() {
      const container = document.getElementById('expense-container');
      container.innerHTML = '';

      if (expenses.length === 0) {
        container.innerHTML = `<div class="text-center py-8 text-slate-500 text-xs border border-dashed border-slate-800 rounded-xl">経費はまだ登録されていません。</div>`;
        return;
      }

      expenses.forEach(exp => {
        const row = document.createElement('div');
        row.className = 'p-3 bg-slate-900 border border-slate-800 hover:border-slate-700 rounded-xl space-y-2.5 transition-all';
        row.innerHTML = `
          <div class="flex items-center gap-2">
            <input type="text" value="${exp.name}" onchange="updateExpenseField('${exp.id}', 'name', this.value)" class="flex-1 min-w-0 bg-transparent border-b border-slate-700 text-xs text-white font-semibold focus:outline-none py-0.5">
            <div class="relative w-24 shrink-0">
              <input type="number" value="${exp.amount}" onchange="updateExpenseField('${exp.id}', 'amount', this.value)" class="w-full bg-slate-950 border border-slate-700 rounded-md px-2 py-1 text-xs text-right text-white font-mono focus:outline-none">
              <span class="absolute right-2 top-1 text-[10px] text-slate-500">円</span>
            </div>
            <button onclick="deleteExpenseRow('${exp.id}')" class="text-slate-500 hover:text-rose-400 p-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>
          <div class="flex flex-wrap items-center justify-between gap-2 pt-2 border-t border-slate-800/60 text-[11px]">
            <div class="flex items-center gap-1 text-slate-400">
              <span>立替者:</span>
              <select onchange="updateExpenseField('${exp.id}', 'paidBy', this.value)" class="bg-slate-950 border border-slate-700 rounded px-1.5 py-0.5 text-slate-200 focus:outline-none">
                ${members.map(m => `<option value="${m}" ${exp.paidBy === m ? 'selected' : ''}>${m}</option>`).join('')}
              </select>
            </div>
            <div class="flex items-center gap-1 text-slate-400">
              <span>負担対象者:</span>
              <div class="flex items-center gap-1.5 flex-wrap">
                ${members.map(m => {
                  const isChecked = exp.splitWith.includes(m);
                  return `
                    <label class="inline-flex items-center gap-0.5 cursor-pointer bg-slate-950 px-1.5 py-0.5 rounded border ${isChecked ? 'border-indigo-500/50 text-indigo-300' : 'border-slate-800 text-slate-500'}">
                      <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleExpenseSplitter('${exp.id}', '${m}', this.checked)" class="hidden">
                      <span>${m}</span>
                    </label>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        `;
        container.appendChild(row);
      });
    }

    function addNewExpenseRow() {
      expenses.push({ id: 'exp_' + Date.now(), name: '新規経費', amount: 1000, paidBy: members[0], splitWith: [...members] });
      renderExpenses();
      runCalculations();
    }

    function deleteExpenseRow(id) {
      expenses = expenses.filter(exp => exp.id !== id);
      renderExpenses();
      runCalculations();
    }

    function updateExpenseField(id, field, value) {
      const idx = expenses.findIndex(exp => exp.id === id);
      if (idx === -1) return;
      if (field === 'amount') {
        expenses[idx].amount = Math.max(0, parseInt(value) || 0);
      } else {
        expenses[idx][field] = value;
      }
      runCalculations();
    }

    function toggleExpenseSplitter(id, member, isChecked) {
      const idx = expenses.findIndex(exp => exp.id === id);
      if (idx === -1) return;
      if (isChecked) {
        if (!expenses[idx].splitWith.includes(member)) expenses[idx].splitWith.push(member);
      } else {
        expenses[idx].splitWith = expenses[idx].splitWith.filter(m => m !== member);
      }
      renderExpenses();
      runCalculations();
    }

    function runCalculations() {
      const distance = parseFloat(document.getElementById('input-distance').value) || 0;
      const fuelEconomy = parseFloat(document.getElementById('input-fuel-economy').value) || 0;
      const gasPrice = parseFloat(document.getElementById('input-gas-price').value) || 0;
      const roundMethod = document.getElementById('rounding-method').value;
      const roundUnit = parseInt(document.getElementById('rounding-unit').value) || 1;

      function applyRounding(val) {
        const factor = roundUnit;
        const base = val / factor;
        let roundedBase = 0;
        if (roundMethod === 'floor') roundedBase = Math.floor(base);
        else if (roundMethod === 'ceil') roundedBase = Math.ceil(base);
        else roundedBase = Math.round(base);
        return roundedBase * factor;
      }

      let gasCost = 0;
      if (distance > 0 && fuelEconomy > 0 && gasPrice > 0) {
        gasCost = Math.round((distance / fuelEconomy) * gasPrice);
        document.getElementById('gas-calc-formula').textContent = `${distance}km ÷ ${fuelEconomy}km/L × ${gasPrice}円`;
      } else {
        document.getElementById('gas-calc-formula').textContent = '0.0km ÷ 0.0km/L × 0.0円';
      }
      document.getElementById('gas-calc-total').textContent = gasCost.toLocaleString();

      const paidAmounts = {};
      const shareAmounts = {};
      members.forEach(m => { paidAmounts[m] = 0; shareAmounts[m] = 0; });

      if (gasCost > 0 && members.length > 0) {
        paidAmounts[members[0]] += gasCost;
        const gasShare = gasCost / members.length;
        members.forEach(m => { shareAmounts[m] += gasShare; });
      }

      expenses.forEach(exp => {
        paidAmounts[exp.paidBy] += exp.amount;
        const splitting = exp.splitWith.filter(m => members.includes(m));
        if (splitting.length > 0) {
          const perMemberShare = exp.amount / splitting.length;
          splitting.forEach(m => { shareAmounts[m] += perMemberShare; });
        }
      });

      const otherExpensesTotal = expenses.reduce((acc, curr) => acc + curr.amount, 0);
      const grandTotal = gasCost + otherExpensesTotal;
      document.getElementById('calc-grand-total').textContent = `${grandTotal.toLocaleString()}円`;

      const perCapitaBase = applyRounding(grandTotal / members.length);
      document.getElementById('calc-per-capita').textContent = `${perCapitaBase.toLocaleString()}円`;

      const netBalances = {};
      members.forEach(m => { netBalances[m] = paidAmounts[m] - shareAmounts[m]; });

      const transactions = calculateOptimizedCashflow(netBalances, applyRounding);

      const routeContainer = document.getElementById('settlement-route-container');
      routeContainer.innerHTML = '';
      if (transactions.length === 0) {
        routeContainer.innerHTML = `<div class="text-center py-4 text-slate-500 font-mono text-xs">差額精算なし。全員均衡しています。</div>`;
      } else {
        transactions.forEach(t => {
          const row = document.createElement('div');
          row.className = 'flex items-center justify-between p-2.5 bg-slate-950 rounded-lg border border-slate-800 font-mono text-xs';
          row.innerHTML = `<div><span class="text-rose-400 font-bold">${t.from}</span> ➔ <span class="text-emerald-400 font-bold">${t.to}</span></div><span class="text-indigo-400 font-extrabold">${t.amount.toLocaleString()}円</span>`;
          routeContainer.appendChild(row);
        });
      }

      generateLineText(gasCost, otherExpensesTotal, grandTotal, perCapitaBase, transactions, distance, fuelEconomy, gasPrice);
    }

    function calculateOptimizedCashflow(balances, roundFunc) {
      let debtors = [];
      let creditors = [];
      for (let m in balances) {
        if (balances[m] < -0.1) debtors.push({ name: m, amount: -balances[m] });
        else if (balances[m] > 0.1) creditors.push({ name: m, amount: balances[m] });
      }
      debtors.sort((a, b) => b.amount - a.amount);
      creditors.sort((a, b) => b.amount - a.amount);

      let transactions = [];
      let i = 0, j = 0;
      while (i < debtors.length && j < creditors.length) {
        let debtor = debtors[i];
        let creditor = creditors[j];
        let amount = Math.min(debtor.amount, creditor.amount);
        let finalAmount = roundFunc(amount);
        if (finalAmount <= 0 && amount > 0) finalAmount = Math.round(amount);

        if (finalAmount > 0) {
          transactions.push({ from: debtor.name, to: creditor.name, amount: finalAmount });
        }
        debtor.amount -= amount;
        creditor.amount -= amount;
        if (debtor.amount < 0.1) i++;
        if (creditor.amount < 0.1) j++;
      }
      return transactions;
    }

    function generateLineText(gasCost, other, grandTotal, perCapita, transactions, dist, economy, gasPrice) {
      let text = `【ドライブ精算詳細】\n\n■経費合計：${grandTotal.toLocaleString()}円\n`;
      if (gasCost > 0) text += `・ガソリン代：${gasCost.toLocaleString()}円 (${dist}km ÷ ${economy}km/L × ${gasPrice}円)\n`;
      
      expenses.filter(e => e.amount > 0).forEach(exp => {
        text += `・${exp.name}：${exp.amount.toLocaleString()}円 (立替: ${exp.paidBy})\n`;
      });

      text += `\n■1人あたりの負担額 (${members.length}名)：${perCapita.toLocaleString()}円\n\n■各自の精算アクション\n`;
      if (transactions.length > 0) {
        transactions.forEach(t => { text += `・${t.from} ➔ ${t.to}へ支払い：${t.amount.toLocaleString()}円\n`; });
      } else {
        text += `・差額の精算はありません。\n`;
      }
      const method = document.getElementById('rounding-method').value === 'floor' ? '切り捨て' : document.getElementById('rounding-method').value === 'ceil' ? '切り上げ' : '四捨五入';
      text += `\n※各端数は${document.getElementById('rounding-unit').value}円単位で${method}計算しています。`;
      document.getElementById('line-output').value = text;
    }

    function copyLineTextToClipboard() {
      const output = document.getElementById('line-output');
      output.select();
      navigator.clipboard.writeText(output.value);
      alert('LINE共有用テキストをクリップボードにコピーしました！');
    }

    function triggerOcrSim(type) {
      const overlay = document.getElementById('ocr-scanner');
      const statusText = document.getElementById('ocr-status');
      const detailsText = document.getElementById('ocr-details');
      overlay.classList.remove('hidden');

      if (type === 'meter') {
        statusText.textContent = '車載メーターを解析中...';
        detailsText.textContent = 'TRIP B 距離、平均燃費情報をAIが読み取っています。';
        setTimeout(() => {
          document.getElementById('input-distance').value = 74.4;
          document.getElementById('input-fuel-economy').value = 11.3;
          overlay.classList.add('hidden');
          runCalculations();
        }, 1500);
      } else if (type === 'gogogs') {
        statusText.textContent = 'gogo.gs スクショ解析中...';
        detailsText.textContent = '東京都レギュラーガソリン平均単価データを同期中。';
        setTimeout(() => {
          document.getElementById('input-gas-price').value = 163.1;
          overlay.classList.add('hidden');
          runCalculations();
        }, 1500);
      } else if (type === 'receipt') {
        statusText.textContent = 'レシートをOCR読み取り中...';
        detailsText.textContent = '項目から特定メニュー、金額を抽出しています。';
        setTimeout(() => {
          expenses.push({
            id: 'exp_' + Date.now(),
            name: '中華大新 特製餃子(割り勘対象)',
            amount: 1000,
            paidBy: '岩崎',
            splitWith: [...members]
          });
          renderExpenses();
          overlay.classList.add('hidden');
          runCalculations();
        }, 1500);
      }
    }
  </script>
