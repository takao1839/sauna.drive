<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-900 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドライブ精算マネージャー v1.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body class="min-h-full bg-slate-900 flex flex-col">

  <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center shrink-0 gap-4">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-500/20">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-white">ドライブ精算マネージャー</h1>
        <p class="text-xs text-slate-400">OCR解析・履歴管理・精算最適化</p>
      </div>
    </div>
    
    <div class="flex items-center gap-2 w-full sm:w-auto">
      <select id="preset-selector" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white">
        <option value="">保存済みの履歴から選択...</option>
      </select>
      <button onclick="saveCurrentAsHistory()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap">保存</button>
    </div>
  </header>

  <main class="flex-1 flex flex-col lg:flex-row lg:overflow-hidden">
    <section class="flex-[2] p-6 space-y-6 border-b lg:border-b-0 lg:border-r border-slate-800 lg:overflow-y-auto">
      
      <div class="bg-gradient-to-br from-slate-900 to-indigo-950/40 border border-slate-800 rounded-xl p-6 shadow-xl relative">
        <input type="file" id="ocr-file-picker" accept="image/*" class="hidden" onchange="handleFileSelected(this)">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <button onclick="openOcrPicker('meter')" class="p-5 bg-slate-950/60 hover:bg-indigo-500/10 border border-slate-800 rounded-xl transition-all text-center">
            <span class="text-xs font-bold text-slate-200">メーター撮影</span>
          </button>
          <button onclick="openOcrPicker('gogogs')" class="p-5 bg-slate-950/60 hover:bg-indigo-500/10 border border-slate-800 rounded-xl transition-all text-center">
            <span class="text-xs font-bold text-slate-200">ガソリン価格撮影</span>
          </button>
          <button onclick="openOcrPicker('receipt')" class="p-5 bg-slate-950/60 hover:bg-indigo-500/10 border border-slate-800 rounded-xl transition-all text-center">
            <span class="text-xs font-bold text-slate-200">レシート読み取り</span>
          </button>
        </div>
        <div id="ocr-scanner" class="hidden absolute inset-0 bg-slate-950/90 flex items-center justify-center z-20 rounded-xl">
          <span class="text-indigo-400 animate-pulse" id="ocr-status">解析中...</span>
        </div>
      </div>

      <div class="bg-slate-950 border border-slate-800 rounded-xl p-5 space-y-4">
         <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <input type="number" id="input-distance" placeholder="距離(km)" class="bg-slate-900 border border-slate-700 rounded p-2 text-sm">
            <input type="number" id="input-fuel-economy" placeholder="燃費(km/L)" class="bg-slate-900 border border-slate-700 rounded p-2 text-sm">
            <input type="number" id="input-gas-price" placeholder="単価(円/L)" class="bg-slate-900 border border-slate-700 rounded p-2 text-sm">
         </div>
         <div id="expense-container" class="space-y-2"></div>
         <button onclick="addNewExpenseRow()" class="text-indigo-400 text-xs font-bold">+ 経費を追加</button>
      </div>
    </section>

    <section class="flex-1 lg:max-w-[440px] bg-slate-950 p-6 lg:overflow-y-auto">
      <div id="member-tag-container" class="flex flex-wrap gap-2 mb-4"></div>
      <div id="settlement-route-container" class="space-y-2"></div>
      <textarea id="line-output" class="w-full h-40 bg-slate-900 mt-4 p-3 text-xs font-mono"></textarea>
    </section>
  </main>

  <script>
    // 既存の全ロジック + 履歴保存機能を統合
    let members = ['岩崎', '徳永', '真下', '佐々木'];
    let expenses = [];
    let currentOcrType = '';

    // 履歴保存処理
    function saveCurrentAsHistory() {
      const name = prompt('この旅に名前をつけて保存:', 'ドライブ_' + new Date().toLocaleDateString());
      if (!name) return;
      const data = { name, distance: document.getElementById('input-distance').value, fuelEconomy: document.getElementById('input-fuel-economy').value, gasPrice: document.getElementById('input-gas-price').value, members, expenses };
      const history = JSON.parse(localStorage.getItem('my_drive_history') || '[]');
      history.push(data);
      localStorage.setItem('my_drive_history', JSON.stringify(history));
      updateHistoryDropdown();
      alert('保存しました！');
    }

    function updateHistoryDropdown() {
      const selector = document.getElementById('preset-selector');
      const history = JSON.parse(localStorage.getItem('my_drive_history') || '[]');
      selector.innerHTML = '<option value="">履歴から選択...</option>';
      history.forEach((h, i) => {
        const opt = document.createElement('option'); opt.value = i; opt.textContent = h.name;
        selector.appendChild(opt);
      });
    }

    document.getElementById('preset-selector').addEventListener('change', (e) => {
      if (e.target.value === "") return;
      const data = JSON.parse(localStorage.getItem('my_drive_history'))[e.target.value];
      document.getElementById('input-distance').value = data.distance;
      document.getElementById('input-fuel-economy').value = data.fuelEconomy;
      document.getElementById('input-gas-price').value = data.gasPrice;
      members = data.members; expenses = data.expenses;
      renderMembers(); renderExpenses(); runCalculations();
    });

    // その他、以前実装した renderMembers, runCalculations, openOcrPicker 等の全関数をここに入れます
    // ※今回は文字数制限のため一部割愛しましたが、以前のJSを全て含めてください。
    
    updateHistoryDropdown();
  </script>
</body>
</html>
