<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-900 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドライブ精算マネージャー</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-full bg-slate-900 flex flex-col">

  <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex flex-col sm:flex-row justify-between items-center shrink-0 gap-4">
    <h1 class="text-xl font-bold text-white">ドライブ精算マネージャー</h1>
    <div class="flex items-center gap-2 w-full sm:w-auto">
      <select id="preset-selector" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white">
        <option value="">履歴から選択...</option>
      </select>
      <button onclick="saveCurrentAsHistory()" class="bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap">保存</button>
    </div>
  </header>

  <main class="flex-1 p-6">
    <p class="text-sm text-slate-400">※情報を入力後、「保存」ボタンを押すと履歴に追加されます。</p>
  </main>

  <script>
    // 履歴管理ロジック
    function saveCurrentAsHistory() {
      const tripName = prompt('この旅の名前をつけて保存してください:', '新規の旅_' + new Date().toLocaleDateString());
      if (!tripName) return;

      const historyData = {
        name: tripName,
        distance: document.getElementById('input-distance').value,
        fuelEconomy: document.getElementById('input-fuel-economy').value,
        gasPrice: document.getElementById('input-gas-price').value,
        members: members,
        expenses: expenses
      };

      // localStorageに保存
      const history = JSON.parse(localStorage.getItem('my_drive_history') || '[]');
      history.push(historyData);
      localStorage.setItem('my_drive_history', JSON.stringify(history));
      
      updateHistoryDropdown();
      alert('保存しました！');
    }

    function updateHistoryDropdown() {
      const selector = document.getElementById('preset-selector');
      const history = JSON.parse(localStorage.getItem('my_drive_history') || '[]');
      
      // 初期値以外をクリアして再構築
      selector.innerHTML = '<option value="">履歴から選択...</option>';
      history.forEach((h, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = h.name;
        selector.appendChild(option);
      });
    }

    // 履歴から読み込み
    document.getElementById('preset-selector').addEventListener('change', (e) => {
      const index = e.target.value;
      if (index === "") return;
      const history = JSON.parse(localStorage.getItem('my_drive_history'));
      const data = history[index];
      
      // 各フォームへ反映
      document.getElementById('input-distance').value = data.distance;
      document.getElementById('input-fuel-economy').value = data.fuelEconomy;
      document.getElementById('input-gas-price').value = data.gasPrice;
      members = data.members;
      expenses = data.expenses;
      
      renderMembers();
      renderExpenses();
      runCalculations();
    });

    // 初期化時に履歴を読み込む
    updateHistoryDropdown();
  </script>
</body>
</html>
